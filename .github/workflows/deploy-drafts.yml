name: Deploy Draft Preview Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: drafts-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.304.0
        with:
          ruby-version: "3.2.6"
          bundler-cache: true
          cache-version: 1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install Staticrypt
        run: |
          set -euo pipefail

          # Install once so encryption does not depend on repeated npx fetches.
          for i in 1 2 3; do
            npm install --no-audit --no-fund --save-dev staticrypt && break
            if [[ "$i" -eq 3 ]]; then
              echo "::error::Failed to install staticrypt after 3 attempts"
              exit 1
            fi
            echo "Retrying staticrypt install ($i/3)"
            sleep 5
          done

      - name: Build with Jekyll (drafts + future)
        run: bundle exec jekyll build --drafts --future --config _config.yml,_config_drafts.yml
        env:
          JEKYLL_ENV: production

      - name: Encrypt HTML with Staticrypt
        env:
          DRAFTS_PASSWORD: ${{ secrets.DRAFTS_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "$DRAFTS_PASSWORD" ]]; then
            echo "::error::Missing DRAFTS_PASSWORD secret"
            exit 1
          fi

          slug_from_source_file() {
            local source_file="$1"
            local base
            base="$(basename "$source_file")"
            base="${base%.markdown}"
            base="${base%.md}"
            # Strip leading YYYY-MM-DD- when present.
            echo "${base#????-??-??-}"
          }

          declare -A seen_targets=()
          declare -a target_files=()

          add_target_for_slug() {
            local slug="$1"
            local candidate

            for candidate in "_site/${slug}/index.html" "_site/${slug}.html"; do
              if [[ -f "$candidate" && -z "${seen_targets[$candidate]+x}" ]]; then
                seen_targets[$candidate]=1
                target_files+=("$candidate")
              fi
            done
          }

          # 1) Encrypt all draft article pages.
          # Only process actual posts (files starting with YYYY-MM-DD), excluding utility docs.
          while IFS= read -r -d '' source_file; do
            base="$(basename "$source_file")"
            # Only encrypt if it starts with YYYY-MM-DD pattern (actual post format).
            if [[ "$base" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2} ]]; then
              add_target_for_slug "$(slug_from_source_file "$source_file")"
            fi
          done < <(find _drafts -maxdepth 1 -type f \( -name '*.md' -o -name '*.markdown' \) -print0)

          # 2) Encrypt only future-dated _posts article pages.
          today_epoch="$(date -u +%s)"
          while IFS= read -r -d '' source_file; do
            base="$(basename "$source_file")"
            post_date="${base:0:10}"

            if [[ "$post_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              post_epoch="$(date -u -d "$post_date" +%s)"
              if (( post_epoch > today_epoch )); then
                add_target_for_slug "$(slug_from_source_file "$source_file")"
              fi
            fi
          done < <(find _posts -maxdepth 1 -type f \( -name '*.md' -o -name '*.markdown' \) -print0)

          echo "Encrypting ${#target_files[@]} draft/future article pages"

          if [[ "${#target_files[@]}" -eq 0 ]]; then
            echo "No files to encrypt"
            exit 0
          fi

          # Create temporary directory for encrypted output
          temp_encrypt_dir="$(mktemp -d)"
          trap "rm -rf '$temp_encrypt_dir'" EXIT

          # Encrypt files one at a time to avoid basename collisions
          # (e.g., multiple _site/*/index.html files all output to temp/index.html)
          for file in "${target_files[@]}"; do
            # Create unique temp file path for this encryption
            relative_path="${file#_site/}"
            unique_name="${relative_path//\//_}"  # Convert paths/to/file.html -> paths_to_file.html
            
            # Encrypt to a unique temporary file using input redirection
            temp_specific_dir="$temp_encrypt_dir/$(basename "$file" .html)_$$_$RANDOM"
            mkdir -p "$temp_specific_dir"
            
            npm exec staticrypt -- \
              "$file" \
              -p "$DRAFTS_PASSWORD" \
              --short \
              --remember 30 \
              --template-title "Draft Preview - mcgarrah.org" \
              -d "$temp_specific_dir" \
              -c false \
              2>&1 | tee /tmp/staticrypt-"${unique_name}.log"
            
            # Staticrypt outputs to temp_dir/basename.html (flattens paths)
            actual_basename="$(basename "$file")"
            encrypted_src="$temp_specific_dir/$actual_basename"
            
            if [[ ! -f "$encrypted_src" ]]; then
              echo "::error::Encryption did not produce $actual_basename in $temp_specific_dir for $file"
              echo "Available files in $temp_specific_dir:"
              ls -la "$temp_specific_dir" 2>/dev/null | head -10
              exit 1
            fi
            
            # Verify the file was actually encrypted
            before_hash="$(sha256sum "$file" | awk '{print $1}')"
            cp "$encrypted_src" "$file"
            after_hash="$(sha256sum "$file" | awk '{print $1}')"

            if [[ "$before_hash" == "$after_hash" ]]; then
              echo "::error::Encryption did not modify $file (hashes match: $before_hash)"
              exit 1
            fi

            echo "✓ Encrypted $(basename "$file") (${before_hash:0:8} → ${after_hash:0:8})"
            
            # Clean up this file's temp directory
            rm -rf "$temp_specific_dir"
          done

          # Final verification: at least one encrypted page contains Staticrypt output
          if ! grep -qi 'staticrypt' "${target_files[0]}"; then
            echo "::error::Staticrypt verification failed - no encrypted content in ${target_files[0]}"
            cat /tmp/staticrypt.log
            exit 1
          fi

          echo "Successfully encrypted ${#target_files[@]} pages"

      - name: Remove oversized binaries from deploy output
        run: |
          set -euo pipefail

          # Exclude executable payloads from the preview deployment.
          rm -rf _site/assets/exes
          find _site -type f \( -iname '*.exe' -o -iname '*.msi' -o -iname '*.dmg' -o -iname '*.pkg' -o -iname '*.iso' \) -print -delete

          # Guard against accidental large-file deploys that should use LFS.
          find _site -type f -size +45M -print -delete

      - name: Apply crawler protections
        run: |
          set -euo pipefail

          printf "User-agent: *\nDisallow: /\n" > _site/robots.txt
          rm -f _site/feed.xml _site/sitemap.xml _site/sitemapindex.xml

          # Remove feed discovery hints from generated pages in preview output.
          find _site -type f -name '*.html' -exec sed -i.bak '/type="application\/atom+xml"/d' {} +
          find _site -type f -name '*.bak' -delete

      - name: Deploy to drafts.mcgarrah.org repo
        env:
          DRAFTS_DEPLOY_TOKEN: ${{ secrets.DRAFTS_DEPLOY_TOKEN }}
          TARGET_REPO: mcgarrah/drafts.mcgarrah.org
        run: |
          set -euo pipefail

          if [[ -z "$DRAFTS_DEPLOY_TOKEN" ]]; then
            echo "::error::Missing DRAFTS_DEPLOY_TOKEN secret"
            exit 1
          fi

          deploy_dir="$(mktemp -d)"
          git clone --depth 1 --branch main "https://x-access-token:${DRAFTS_DEPLOY_TOKEN}@github.com/${TARGET_REPO}.git" "$deploy_dir"

          find "$deploy_dir" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -a _site/. "$deploy_dir"/

          echo "drafts.mcgarrah.org" > "$deploy_dir/CNAME"
          touch "$deploy_dir/.nojekyll"

          cd "$deploy_dir"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No drafts-site changes to deploy"
            exit 0
          fi

          git commit -m "Deploy drafts site from ${GITHUB_SHA}"
          git push origin HEAD:main --force-with-lease
